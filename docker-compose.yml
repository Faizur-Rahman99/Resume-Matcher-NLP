services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: resume-matcher-backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: resume-matcher-frontend

    depends_on:
      - backend

    environment:
      API_URL: http://backend:8000

    ports:
      - "8501:8501"

    volumes:
      - .:/app

    restart: unless-stopped